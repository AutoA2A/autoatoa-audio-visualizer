<main>
  <div class="card">
    <h1>上传音频文件</h1>
    <form id="uploadForm">
      <label>选择本地文件：</label>
      <input type="file" id="fileInput" accept="audio/*">
      <label>或输入音频 URL：</label>
      <input type="url" id="urlInput" placeholder="https://example.com/audio.mp3">
      <button type="submit">上传并编辑</button>
    </form>
  </div>
</main>

<script>
  const form = document.getElementById('uploadForm');
  const fileInput = document.getElementById('fileInput');
  const urlInput = document.getElementById('urlInput');

  // 简单模拟上传：生成新 ID，加入全局数据，然后跳转到 edit.html?id=NEW_ID
  form.addEventListener('submit', function(e){
    e.preventDefault();

    let newId = (window.APP_LIST.reduce((max, item)=>Math.max(max, item.id||0),0) + 1);
    let name = '';
    let url = '';

    if (fileInput.files && fileInput.files[0]) {
      // 这里仅模拟，实际项目应上传文件并获取 URL
      name = fileInput.files[0].name.replace(/\.[^/.]+$/,"");
      url = URL.createObjectURL(fileInput.files[0]);
    } else if (urlInput.value.trim()) {
      name = urlInput.value.trim().split('/').pop().replace(/\.[^/.]+$/,"") || '未命名音频';
      url = urlInput.value.trim();
    } else {
      alert('请提供音频文件或 URL');
      return;
    }

    const newRecord = {
      id: newId,
      name: name,
      url: url,
      visualization: {
        type: 'waveform',
        color: getComputedStyle(document.documentElement).getPropertyValue('--primary').trim(),
        intensity: 'medium'
      }
    };

    // 更新全局数据
    window.APP_LIST.push(newRecord);
    // 兼容可能的别名
    window.APP_DATA = window.APP_LIST;

    // 跳转到编辑页，携带 id 参数
    location.href = `edit.html?id=${newId}`;
  });
</script>
