    button{

  <div class="card" id="editor-card">
    <h2 id="audio-title">加载中…</h2>
    <audio id="audio-player" controls style="width:100%;margin-bottom:var(--spacing-md);"></audio>
    <canvas id="waveform-canvas"></canvas>
    <div style="margin-top:var(--spacing-md);">
      <label>颜色：<input type="color" id="color-picker"></label>
      <label>滤镜：
        <select id="filter-select">
          <option value="none">无</option>
          <option value="grayscale(100%)">灰度</option>
          <option value="invert(100%)">反相</option>
          <option value="sepia(100%)">复古</option>
        </select>
      </label>
      <label>形状：
        <select id="shape-select">
          <option value="waveform">波形</option>
          <option value="bars">柱状</option>
        </select>
      </label>
    </div>
    <div style="margin-top:var(--spacing-lg);">
      <button id="preview-btn">预览</button>
    </div>
  </div>
</main>

<script>
  // 读取 URL 参数中的 id
  const params = new URLSearchParams(location.search);
  const audioId = params.get('id') || '1'; // 默认加载第1条

  const data = getById(audioId);
  if (!data) {
    document.getElementById('audio-title').textContent = '未找到对应音频';
  } else {
    document.getElementById('audio-title').textContent = data.name;
    const player = document.getElementById('audio-player');
    player.src = data.url;

    // 简单的波形占位（实际可接入 Web Audio API）
    const canvas = document.getElementById('waveform-canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = data.visualization.color || getComputedStyle(document.documentElement).getPropertyValue('--primary');
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 颜色、滤镜、形状交互（仅演示 UI）
    document.getElementById('color-picker').value = data.visualization.color || '#ffffff';
    document.getElementById('filter-select').value = 'none';
    document.getElementById('shape-select').value = data.visualization.type || 'waveform';

    // 预览按钮跳转
    document.getElementById('preview-btn').addEventListener('click', () => {
      window.location.href = `preview.html?id=${encodeURIComponent(data.id)}`;
    });
  }
</script>
